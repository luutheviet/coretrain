<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head(${module.name})}"></head>
<body>
<header th:replace="~{fragments/layout :: header('home')}"></header>

<main class="container">
    <p class="breadcrumb"><a th:href="@{/}">← Về Dashboard</a></p>

    <section class="card module-head">
        <span class="module-icon big" th:text="${module.icon}">👤</span>
        <div>
            <h1 th:text="${module.name}">CIF</h1>
            <p class="muted" th:text="${lessonCount} + ' bài học'">3 bài học</p>
        </div>
    </section>

    <section class="card">
        <p class="section-label">NỘI DUNG PHÂN HỆ</p>
        <p class="muted" th:if="${sections.isEmpty()}">Phân hệ này chưa có nội dung.</p>

        <!-- Chương → bài học (cấu trúc Udemy) -->
        <div class="section-group" th:each="g : ${sections}">
            <div class="section-head">
                <span class="section-title" th:text="${g.section.title}">Chương 1: Nhập môn CIF</span>
                <span class="section-count" th:text="${g.lessons.size()} + ' bài'">3 bài</span>
            </div>
            <ul class="lesson-list" th:unless="${g.lessons.isEmpty()}">
                <li th:each="l : ${g.lessons}">
                    <a class="lesson-item" th:href="@{'/lessons/' + ${l.id}}">
                        <span class="lesson-code" th:text="${l.code}">CIF03</span>
                        <span th:text="${l.title}">Quy trình tạo CIF Khách hàng tổ chức</span>
                    </a>
                </li>
            </ul>
            <p class="muted" th:if="${g.lessons.isEmpty()}">Chương này chưa có bài.</p>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
