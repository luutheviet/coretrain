<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Trang chủ')}"></head>
<body>
<header th:replace="~{fragments/layout :: header('home')}"></header>

<main class="container">
    <!-- Khối chào (UX-DR2) -->
    <section class="card hello-card">
        <div>
            <p class="section-label">XIN CHÀO</p>
            <h1>Xin chào, <span th:text="${displayName}">user</span>!</h1>
            <p class="muted" th:if="${lastViewed != null}">
                Bài học xem gần nhất:
                <span th:text="${lastViewed.code + '. ' + lastViewed.title}">CIF03. ...</span>
            </p>
            <p class="muted" th:if="${lastViewed == null}">Chưa xem bài nào — chọn một phân hệ bên dưới để bắt đầu.</p>
        </div>
        <!-- Nút chỉ hiện khi có bài đang dở; đích /lessons/{id} do Story 1.3 dựng, giá trị cột do 1.4 ghi -->
        <a class="btn btn-primary" th:if="${lastViewed != null}" th:href="@{'/modules/' + ${lastViewed.module.id}}">TIẾP TỤC HỌC →</a>
    </section>

    <!-- Lưới thẻ phân hệ — render động theo bảng module -->
    <section>
        <p class="section-label">DANH MỤC PHÂN HỆ</p>
        <p class="muted" th:if="${cards.isEmpty()}">Chưa có phân hệ nào — dữ liệu seed chưa chạy, liên hệ quản trị.</p>
        <div class="module-grid" th:unless="${cards.isEmpty()}">
            <a class="module-card" th:each="c : ${cards}" th:href="@{'/modules/' + ${c.module.id}}">
                <span class="module-icon" th:text="${c.module.icon}">💰</span>
                <span class="module-name" th:text="${c.module.name}">Tiền vay</span>
                <span class="module-count" th:text="${c.lessonCount} + ' bài học'">59 bài học</span>
            </a>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
